<!-- <!DOCTYPE html> -->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookah App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 1. ГЛОБАЛЬНЫЕ СТИЛИ И МЕНЮ (Твоя база) */
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            /* Начальный маленький отступ */
            padding-bottom: 20px; 
            /* Плавное изменение отступа */
            transition: padding-bottom 0.3s ease; 
        }
    
        select {
            padding: 12px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
    
        /* 5. Карточка товара (теперь точно совпадает с заголовком) */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px; /* Такая же внутренняя набивка, как у заголовка */
            margin: 8px 0; /* Такой же внешний отступ */
            border-radius: 12px;
        }

        /* Полная замена старого блока .menu-item button */
        .menu-item button {
            margin: 0;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            background-color: #007aff; /* Синий Telegram */
            color: #ffffff;
            border: none;
            border-radius: 20px; /* Современная скругленная форма */
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.15);
            transition: all 0.2s ease;
            cursor: pointer; /* Оставляем для Desktop-версии */
            -webkit-tap-highlight-color: transparent;
        }
        
        .menu-item button:active {
            transform: scale(0.95); /* Эффект нажатия */
            background-color: #0062cc;
        }

        #menu-container {
            width: 100%; /* Растягиваем на всю доступную ширину */
            max-width: 500px; /* Ограничение для больших экранов */
        }
    
        /* 2. ИСПРАВЛЕННАЯ КОРЗИНА (Мой фикс для кнопок и текста) */
        #cart-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #ffffff;
            color: #222;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            z-index: 9999;
            /* Плавность: трансформация за 0.4 секунды с "пружинистым" эффектом */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform: translateY(0);
            opacity: 1;
        }
        
        /* Класс для "схлопывания" */
        #cart-container.collapsed {
            transform: translateY(100%); /* Улетает вниз за край экрана */
            opacity: 0;
        }
    
        .cart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    
        .cart-header h3 { margin: 0; font-size: 18px; color: #222; }
    
        #cart-items-list {
            max-height: 160px;
            overflow-y: auto;
            margin: 10px 0;
        }
    
        /* Каждая строка товара в корзине */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f2f2f7;
        }
    
        /* ФИКС КНОПОК: Теперь они точно будут круглыми */
        .item-controls { display: flex; align-items: center; gap: 12px; }
        
        .item-controls button {
            width: 32px !important;
            height: 32px !important;
            min-width: 32px !important;
            border-radius: 50% !important;
            border: none !important;
            background: #007aff !important; /* Синий Telegram */
            color: #ffffff !important;
            font-size: 18px !important;
            font-weight: bold !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 0 !important;
            margin: 0 !important;
        }
    
        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 20px;
            margin: 15px 0;
            color: #222;
        }
    
        .btn-order {
            width: 100%;
            background: #007aff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
        }
    
        .scroll-hint {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #007aff; /* Синий цвет как у кнопок */
            margin: 5px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            /* Анимация плавного прыжка */
            animation: jumpHint 2s infinite;
        }
        
        @keyframes jumpHint {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        /* Стили для заголовков категорий */
        .category-header {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            margin: 8px 0; /* Такой же отступ, как у menu-item */
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .category-header:active {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* 4. Контейнер товаров (убираем все внутренние смещения) */
        .category-content {
            display: none;
            width: 100%;
            padding: 0; /* Никаких отступов слева! */
            margin: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }            
        
        /* Иконка стрелочки */
        .category-arrow {
            transition: transform 0.3s ease;
        }
        
        .category-header.active .category-arrow {
            transform: rotate(180deg);
        }

       /* Стили для контейнера лоадера */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Используем системный цвет фона Telegram */
        background-color: var(--tg-theme-bg-color, #ffffff) !important;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
      }
    
      .spinner {
        width: 45px;
        height: 45px;
        border: 4px solid var(--tg-theme-hint-color, #e0e0e0);
        /* Цвет основной кнопки Telegram для акцента */
        border-top: 4px solid var(--tg-theme-button-color, #3390ec);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
    
      #loader p {
        /* Системный цвет текста Telegram — он сам станет белым в темной теме */
        color: var(--tg-theme-text-color, #000000) !important;
        font-size: 18px;
        font-weight: 700;
        margin-top: 20px;
        text-align: center;
        font-family: sans-serif;
      }
    
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
    <div id="loader">
      <div class="spinner"></div>
      <p>Загружаем меню...</p>
    </div>
    
    <div style="display: flex; gap: 10px; width: 100%; margin-bottom: 20px;">
        <button onclick="sendServiceRequest('call')" style="flex: 1; background-color: #f39c12; margin: 0; padding: 10px;">🙋‍♂️ Позвать</button>
        <button onclick="sendServiceRequest('bill')" style="flex: 1; background-color: #27ae60; margin: 0; padding: 10px;">💳 Счет</button>
    </div>
    <h2>Marivanna Elista</h2>
    
    <label for="table">Выберите стол:</label>
    <select id="table">
        <option value="1">Стол №1</option>
        <option value="2">Стол №2</option>
        <option value="3">Стол №3</option>
        <option value="4">Стол №4</option>
        <option value="5">Стол №5</option>
        <option value="6">Стол №6</option>
        <option value="7">Стол №7</option>
    </select>
    
    <div id="menu-container" class="menu"></div>

    <div id="cart-container" style="display: none;">
        <div class="cart-header">
            <h3>Ваш заказ</h3>
            <span id="items-count">0 шт.</span>
        </div>
    
        <div id="cart-items-list"></div>
        
        <div class="scroll-hint" id="scroll-hint">↓ Листайте вниз ↓</div>
    
        <div class="cart-footer">
            <div class="total-row">
                <span>Итого к оплате:</span>
                <span><span id="cart-total">0</span>₽</span>
            </div>
            <button class="btn-order" onclick="sendCartOrder()">Заказать всё</button>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        const GET_MENU_URL = 'https://brikitvak.app.n8n.cloud/webhook/get-menu';
        const SEND_ORDER_URL = 'https://brikitvak.app.n8n.cloud/webhook/hookah-order';
        
        tg.expand();

        let cart = {}; // Объект для хранения товаров в корзине
        
        // 1. Загрузка меню из Google Таблиц с проверкой пользователя
        async function loadMenu() {
            // Находим наш лоадер (убедись, что в HTML у него id="loader")
            const loader = document.getElementById('loader');
            const menuContainer = document.getElementById('menu-container');
        
            try {
                // 1. Показываем лоадер перед началом запроса
                if (loader) loader.style.display = 'flex';
                
                const username = tg.initDataUnsafe.user?.username || "guest";
                const url = `${GET_MENU_URL}?user=${username}`;
                
                // Запрос уходит в n8n на узел Webhook
                const response = await fetch(url);
                let menuItems = await response.json();
                
                // Пока n8n проходит через If и Google Sheets, лоадер крутится
                const dataArray = Array.isArray(menuItems) ? menuItems : [menuItems];
                menuContainer.innerHTML = ''; 
        
                // Группируем товары
                const groupedMenu = dataArray.reduce((acc, item) => {
                    const rawData = item.json ? item.json : item;
                    const category = rawData["категория"] || rawData["Категория"] || "Прочее";
                    if (!acc[category]) acc[category] = [];
                    acc[category].push(rawData);
                    return acc;
                }, {});
        
                // Отрисовываем категории
                Object.keys(groupedMenu).forEach((categoryName, index) => {
                    const categoryId = `cat-${index}`;
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerHTML = `<span>${categoryName}</span><span class="category-arrow">▼</span>`;
                    header.onclick = () => toggleCategory(categoryId, header);
                    
                    const content = document.createElement('div');
                    content.id = categoryId;
                    content.className = 'category-content';
                    
                    groupedMenu[categoryName].forEach(rawData => {
                        const name = rawData["наименование"] || rawData["Наименование"];
                        const price = rawData["цена"] || rawData["Цена"];
        
                        if (name) {
                            const itemDiv = document.createElement('div');
                            itemDiv.className = 'menu-item';
                            itemDiv.innerHTML = `
                                <span>${name} — ${price}₽</span>
                                <button onclick="addToCart('${name}', ${price}, '${categoryName}')">Добавить</button>
                            `;
                            content.appendChild(itemDiv);
                        }
                    });
        
                    menuContainer.appendChild(header);
                    menuContainer.appendChild(content);
                });
        
                // 2. ПРЯЧЕМ ЛОАДЕР: Данные получены и отрисованы
                if (loader) loader.style.display = 'none';
        
            } catch (e) {
                console.error("Ошибка загрузки меню", e);
                // В случае ошибки тоже прячем лоадер, чтобы экран не "завис"
                if (loader) {
                    loader.style.display = 'none';
                    menuContainer.innerHTML = '<p style="text-align:center; padding:20px;">Не удалось загрузить меню. Попробуйте обновить страницу.</p>';
                }
            }
        }
        
        // Функция для раскрытия/закрытия категории
        function toggleCategory(id, header) {
            const content = document.getElementById(id);
            const isOpen = content.style.display === "block";
            
            // 1. Находим ВСЕ открытые контенты и скрываем их
            document.querySelectorAll('.category-content').forEach(el => {
                el.style.display = 'none';
            });
        
            // 2. У ВСЕХ заголовков убираем класс 'active' (поворот стрелочки)
            document.querySelectorAll('.category-header').forEach(el => {
                el.classList.remove('active');
            });
        
            // 3. Если категория была закрыта — открываем её
            if (!isOpen) {
                content.style.display = "block";
                header.classList.add('active');
                
                // Плавный скролл к открытой категории (опционально)
                header.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            // Легкая вибрация при переключении
            if (tg.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        }
        
        // 2. Логика добавления в корзину
        function addToCart(name, price, category) {
            if (cart[name]) {
                cart[name].qty += 1;
            } else {
                cart[name] = { price: price, qty: 1, category: category };
            }
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
        }
        
        // 3. Логика удаления из корзины
        function removeFromCart(name) {
            if (cart[name]) {
                if (cart[name].qty > 1) {
                    cart[name].qty -= 1;
                } else {
                    delete cart[name]; // Если товар один, удаляем его совсем
                }
                updateCartUI();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        // 4. Обновление внешнего вида корзины
        function updateCartUI() {
            const container = document.getElementById('cart-container');
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('items-count');
            const hint = document.getElementById('scroll-hint');
        
            let total = 0;
            let itemCount = 0;
            let itemsHtml = "";
            const itemsKeys = Object.keys(cart);
        
            if (itemsKeys.length > 0) {
                // 1. Показываем корзину
                container.style.display = "block";
                
                // 2. ДОБАВЛЯЕМ ОТСТУП у body, чтобы меню не перекрывалось
                document.body.style.paddingBottom = "360px"; 
        
                itemsKeys.forEach(name => {
                    const item = cart[name];
                    total += item.price * item.qty;
                    itemCount += item.qty;
                    itemsHtml += `
                        <div class="cart-item">
                            <span>${name}</span>
                            <div class="item-controls">
                                <button onclick="removeFromCart('${name}')">-</button>
                                <span>${item.qty}</span>
                                <button onclick="addToCart('${name}', ${item.price}, '${item.category}')">+</button>
                            </div>
                        </div>`;
                });
                
                list.innerHTML = itemsHtml;
                totalEl.innerText = total;
                countEl.innerText = itemCount + " шт.";
                
                // Показываем подсказку, если товаров больше 3
                hint.style.display = itemsKeys.length > 3 ? "block" : "none";
        
            } else {
                // Корзина пуста — скрываем её без лишних условий
                container.style.display = "none";
                document.body.style.paddingBottom = "40px";
                
                // На всякий случай сбрасываем состояние анимации
                container.classList.remove('collapsed');
            }
        }
        
        // 5. Отправка всей корзины в n8n одним махом
        async function sendCartOrder() {
            const container = document.getElementById('cart-container');
            const table = document.getElementById('table').value;
            
            // Формируем данные заказа
            const itemsArray = Object.keys(cart).map(name => ({
                name: name,
                quantity: cart[name].qty,
                price: cart[name].price,
                category: cart[name].category
            }));
        
            const data = {
                action: "new_order",
                table_number: table,
                client_name: tg.initDataUnsafe.user?.username || "Guest",
                items: itemsArray
            };
        
            try {
                const response = await fetch(SEND_ORDER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
        
                if (response.ok) {
                    // 1. Запускаем анимацию улетания вниз
                    container.classList.add('collapsed');
        
                    // 2. Ждем 400мс, пока корзина улетит
                    setTimeout(() => {
                        // 3. ОБНУЛЯЕМ ОБЪЕКТ КОРЗИНЫ (критически важно)
                        cart = {}; 
                        
                        // 4. Обновляем UI — теперь он точно скроет контейнер, 
                        // так как в объекте cart ничего нет
                        updateCartUI(); 
        
                        // 5. Только теперь показываем уведомление
                        if (tg.showPopup) {
                            tg.showPopup({ message: "🚀 Заказ отправлен!" });
                        }
                    }, 400);
                }
            } catch (e) {
                console.error("Ошибка:", e);
                alert("Произошла ошибка при отправке");
            }
        }

    // 6. Обновленная функция для кнопок "Позвать" и "Счет"
            async function sendServiceRequest(type) {
                const table = document.getElementById('table').value;
                const actionText = type === 'call' ? "Вызов" : "Запрос счета";
                
                // Теперь мы передаем и username, и цифровой ID
                const data = {
                    action: type,
                    table_number: table,
                    user_id: tg.initDataUnsafe.user?.id, // Чтобы бот знал, кому слать чек
                    client_name: tg.initDataUnsafe.user?.username || "Guest"
                };
            
                try {
                    const response = await fetch(SEND_ORDER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
            
                    if (response.ok) {
                        if (tg.isVersionAtLeast('6.2')) {
                            tg.showPopup({ message: `${actionText} отправлен!` });
                        } else {
                            alert(`${actionText} отправлен!`);
                        }
                    }
                } catch (e) {
                    console.error("Ошибка сети", e);
                }
            }
        // Запуск приложения
        loadMenu();
    </script>
</body>
</html>
